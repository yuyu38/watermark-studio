<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>水印工坊 - Watermark Studio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <h1>水印工坊</h1>
            </div>
            <div class="header-right">
                <p class="security-hint">🔒 100%本地运行 · 无需联网</p>
            </div>
        </header>

        <main class="app-main">
            <section class="preview-section">
                <div class="preview-container" id="previewContainer">
                    <div class="preview-placeholder" id="placeholder">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21,15 16,10 5,21"/>
                            </svg>
                        </div>
                        <p class="placeholder-text">选择或拍摄照片开始添加水印</p>
                    </div>
                    <canvas id="previewCanvas" class="preview-canvas"></canvas>
                </div>
            </section>

            <section class="controls-section" id="controlsSection">
                <section class="buttons-section">
                    <div class="btn-grid">
                        <button class="btn btn-primary" id="selectImageBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21,15 16,10 5,21"/>
                            </svg>
                            选择照片
                        </button>
                        <button class="btn btn-success disabled" id="saveToGalleryBtn" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                <polyline points="17 21 17 13 7 13 7 21"/>
                                <polyline points="7 3 7 8 15 8"/>
                            </svg>
                            保存
                        </button>
                        <button class="btn btn-outline disabled" id="copyToClipboardBtn" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            复制到剪贴板
                        </button>
                    </div>
                </section>

                <div class="control-group">
                    <label class="control-label">水印文字</label>
                    <input 
                        type="text" 
                        id="watermarkText" 
                        class="text-input" 
                        placeholder="请输入水印文字"
                        value="该证件仅供XX查看，不得他用"
                        maxlength="50"
                    >
                </div>

                <div class="control-group">
                    <div class="control-header">
                        <label class="control-label">布局模式</label>
                    </div>
                    <div class="mode-switch">
                        <button class="mode-btn active" data-mode="tiled">平铺水印</button>
                        <button class="mode-btn" data-mode="single">单个水印</button>
                    </div>
                </div>

                <div class="control-group" id="tiledModeControls">
                    <div class="control-header">
                        <label class="control-label">平铺字体大小</label>
                        <span class="control-value" id="tiledFontSizeValue">80px</span>
                    </div>
                    <input 
                        type="range" 
                        id="tiledFontSizeSlider" 
                        class="slider" 
                        min="12" 
                        max="200" 
                        value="80"
                    >
                </div>

                <div class="control-group" id="singleModeControls" style="display: none;">
                    <div class="control-header">
                        <label class="control-label">字体大小</label>
                        <span class="control-value" id="fontSizeValue">200px</span>
                    </div>
                    <input 
                            type="range" 
                            id="fontSizeSlider" 
                            class="slider" 
                            min="12" 
                            max="200" 
                            value="200"
                        >
                </div>

                <div class="control-group">
                    <div class="control-header">
                        <label class="control-label">透明度</label>
                        <span class="control-value" id="opacityValue">100%</span>
                    </div>
                    <input 
                        type="range" 
                        id="opacitySlider" 
                        class="slider" 
                        min="10" 
                        max="100" 
                        value="100"
                    >
                </div>

                <div class="control-group" id="singlePositionSection">
                    <label class="control-label">水印位置</label>
                    <div class="position-grid" id="positionGrid">
                        <button class="position-btn" data-position="top-left" title="左上"></button>
                        <button class="position-btn" data-position="top-center" title="上中"></button>
                        <button class="position-btn" data-position="top-right" title="右上"></button>
                        <button class="position-btn" data-position="middle-left" title="左中"></button>
                        <button class="position-btn active" data-position="middle-center" title="居中"></button>
                        <button class="position-btn" data-position="middle-right" title="右中"></button>
                        <button class="position-btn" data-position="bottom-left" title="左下"></button>
                        <button class="position-btn" data-position="bottom-center" title="下中"></button>
                        <button class="position-btn" data-position="bottom-right" title="右下"></button>
                    </div>
                </div>

                <div class="control-group" id="tiledSpacingSection">
                    <div class="control-header">
                        <label class="control-label">平铺间隔</label>
                        <span class="control-value" id="spacingValue">200px</span>
                    </div>
                    <input 
                        type="range" 
                        id="spacingSlider" 
                        class="slider" 
                        min="30" 
                        max="600" 
                        value="200"
                    >
                </div>

                <div class="control-group" id="tiledRotationSection">
                    <div class="control-header">
                        <label class="control-label">旋转角度</label>
                        <span class="control-value" id="rotationValue">40°</span>
                    </div>
                    <input 
                        type="range" 
                        id="rotationSlider" 
                        class="slider" 
                        min="-60" 
                        max="60" 
                        value="40"
                    >
                </div>

                <div class="control-group">
                    <label class="control-label">文字颜色</label>
                    <div class="color-picker">
                        <input type="color" id="watermarkColor" value="#ffffff">
                        <span class="color-value" id="colorValue">#ffffff</span>
                    </div>
                </div>
            </section>
        </main>

        <div class="toast" id="toast">
            <span class="toast-message"></span>
        </div>

        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    </div>

    <script src="js/bridge.js"></script>
    <script src="js/watermark-engine.js"></script>
    <script src="js/file-handler.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
